name: ${KKREPO_PROJECT_NAME:-kkrepo-quickstart}

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${KKREPO_MYSQL_ROOT_PASSWORD:-kkrepo_root}
      MYSQL_DATABASE: ${KKREPO_MYSQL_DATABASE:-kkrepo}
      MYSQL_USER: ${KKREPO_MYSQL_USER:-kkrepo}
      MYSQL_PASSWORD: ${KKREPO_MYSQL_PASSWORD:-kkrepo}
      TZ: Asia/Shanghai
    ports:
      - "23306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  app-data-perms:
    image: alpine:3.20
    user: root
    volumes:
      - kkrepo-data:/data
    command: ["sh", "-c", "mkdir -p /data/blobs && chown -R 999:999 /data"]

  kkrepo:
    image: ghcr.io/klboke/kkrepo:${KKREPO_IMAGE_TAG:-0.2.0}
    depends_on:
      mysql:
        condition: service_healthy
      app-data-perms:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${KKREPO_MYSQL_DATABASE:-kkrepo}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${KKREPO_MYSQL_USER:-kkrepo}
      SPRING_DATASOURCE_PASSWORD: ${KKREPO_MYSQL_PASSWORD:-kkrepo}
      KKREPO_CREDENTIAL_SECRET: ${KKREPO_CREDENTIAL_SECRET:-quickstart-credential-secret-change-me-0123456789}
      KKREPO_API_KEY_PAYLOAD_SECRET: ${KKREPO_API_KEY_PAYLOAD_SECRET:-quickstart-api-key-payload-secret-change-me-0123456789}
      KKREPO_FILE_BASE_DIR: ${KKREPO_FILE_BASE_DIR:-/var/lib/kkrepo/blobs}
    ports:
      - "${KKREPO_HTTP_PORT:-19090}:8080"
      - "${KKREPO_MANAGEMENT_PORT:-19091}:8081"
    volumes:
      - kkrepo-data:/var/lib/kkrepo
    restart: unless-stopped

volumes:
  mysql-data:
  kkrepo-data:
