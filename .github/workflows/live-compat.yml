name: Live Compatibility

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Compatibility suite to run
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - write-smoke
          - extended
          - cargo
          - client-e2e
          - full
  schedule:
    - cron: "0 19 * * *"
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - labeled

permissions:
  contents: read

concurrency:
  group: live-compat-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-compat:
    name: ${{ ((github.event_name == 'workflow_dispatch' && inputs.suite == 'client-e2e') || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-client-e2e'))) && 'Client E2E compatibility' || 'Live compatibility' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.suite != 'cargo') || (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'run-live-compat') || contains(github.event.pull_request.labels.*.name, 'run-client-e2e')))
    env:
      COMPOSE_FILE: docker-compose.compat.yml
      COMPOSE_PROJECT_NAME: kkrepo-compat
      LIVE_COMPAT_SUITE: ${{ github.event_name == 'workflow_dispatch' && inputs.suite || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-client-e2e') && 'client-e2e') || 'smoke' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Node.js
        if: env.LIVE_COMPAT_SUITE == 'client-e2e'
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Set up Python
        if: env.LIVE_COMPAT_SUITE == 'client-e2e'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Go
        if: env.LIVE_COMPAT_SUITE == 'client-e2e'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Set up .NET
        if: env.LIVE_COMPAT_SUITE == 'client-e2e'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Set up Ruby
        if: env.LIVE_COMPAT_SUITE == 'client-e2e'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Set up Rust
        if: env.LIVE_COMPAT_SUITE == 'client-e2e'
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Helm
        if: env.LIVE_COMPAT_SUITE == 'client-e2e'
        uses: azure/setup-helm@v4

      - name: Set up ORAS
        if: env.LIVE_COMPAT_SUITE == 'client-e2e'
        uses: oras-project/setup-oras@v2

      - name: Install Python client build tools
        if: env.LIVE_COMPAT_SUITE == 'client-e2e'
        run: python -m pip install --upgrade build twine

      - name: Validate live compatibility compose file
        run: docker compose -f "$COMPOSE_FILE" config

      - name: Build candidate image
        run: scripts/build-docker-image.sh kkrepo:compat

      - name: Start reference and candidate services
        run: docker compose -f "$COMPOSE_FILE" up -d mysql nexus kkrepo

      - name: Prepare live compatibility fixtures
        run: scripts/ci/live-compat-setup.sh

      - name: Run client E2E suite
        if: env.LIVE_COMPAT_SUITE == 'client-e2e'
        run: scripts/ci/run-live-compat.sh "$LIVE_COMPAT_SUITE"

      - name: Run non-client live compatibility suite
        if: env.LIVE_COMPAT_SUITE != 'client-e2e'
        run: scripts/ci/run-live-compat.sh "$LIVE_COMPAT_SUITE"

      - name: Collect compose logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose -f "$COMPOSE_FILE" ps > artifacts/live-compat-ps.txt || true
          docker compose -f "$COMPOSE_FILE" logs --no-color --timestamps > artifacts/live-compat-compose.log || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-compat-logs
          path: artifacts/
          if-no-files-found: ignore

      - name: Stop services
        if: always()
        run: docker compose -f "$COMPOSE_FILE" down -v

  cargo-compat:
    name: Cargo compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 75
    if: (github.event_name == 'workflow_dispatch' && inputs.suite == 'cargo') || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-live-compat'))
    env:
      COMPOSE_FILE: docker-compose.compat-rust.yml
      COMPOSE_PROJECT_NAME: kkrepo-rust-compat
      LIVE_COMPAT_SUITE: cargo
      NEXUS_COMPAT_PORT: "38090"
      KKREPO_COMPAT_PORT: "18092"
      KKREPO_MANAGEMENT_PORT: "18093"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Validate Cargo compatibility compose file
        run: docker compose -f "$COMPOSE_FILE" config

      - name: Build candidate image
        run: scripts/build-docker-image.sh kkrepo:compat

      - name: Start Cargo reference and candidate services
        run: docker compose -f "$COMPOSE_FILE" up -d mysql nexus kkrepo

      - name: Prepare Cargo compatibility fixtures
        run: scripts/ci/live-compat-setup.sh

      - name: Run Cargo compatibility suite
        run: scripts/ci/run-live-compat.sh "$LIVE_COMPAT_SUITE"

      - name: Collect Cargo compose logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose -f "$COMPOSE_FILE" ps > artifacts/cargo-compat-ps.txt || true
          docker compose -f "$COMPOSE_FILE" logs --no-color --timestamps > artifacts/cargo-compat-compose.log || true

      - name: Upload Cargo logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-compat-logs
          path: artifacts/
          if-no-files-found: ignore

      - name: Stop Cargo services
        if: always()
        run: docker compose -f "$COMPOSE_FILE" down -v
