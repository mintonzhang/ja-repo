# nexus-plus archive deployment configuration.
# Edit this file before starting the service.
#
# This file intentionally lists the main runtime properties so operators can
# discover what can be tuned without reading the source classpath defaults.
# Values here override the packaged application.properties.

# ---------------------------------------------------------------------------
# Application identity and optional Apollo integration
# ---------------------------------------------------------------------------

app.id=nexus-plus
spring.application.name=nexus-plus

# Apollo is disabled unless explicitly enabled before application bootstrap.
# To enable it for archive deployment, prefer environment variables or JVM args:
#   NEXUS_PLUS_APOLLO_META=http://apollo-config:8080 bin/start.sh
#   JAVA_OPTS='-Dapollo.meta=http://apollo-config:8080' bin/start.sh

# ---------------------------------------------------------------------------
# HTTP server
# ---------------------------------------------------------------------------

server.port=8080
server.shutdown=graceful
server.servlet.context-path=/
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=2000
server.tomcat.accept-count=200
server.tomcat.connection-timeout=30s

server.servlet.session.timeout=24h
server.servlet.session.cookie.max-age=-1
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

# ---------------------------------------------------------------------------
# Management and observability
# ---------------------------------------------------------------------------

management.server.port=8081
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.metrics.tags.application=${spring.application.name}

# ---------------------------------------------------------------------------
# MySQL datasource and Flyway
# ---------------------------------------------------------------------------

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/nexus_plus?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=nexus_plus
spring.datasource.password=nexus_plus
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# ---------------------------------------------------------------------------
# Spring runtime
# ---------------------------------------------------------------------------

spring.session.store-type=jdbc
spring.session.timeout=24h
spring.session.jdbc.initialize-schema=never
spring.session.jdbc.table-name=SPRING_SESSION
spring.session.jdbc.flush-mode=on_save

spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Asia/Shanghai
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.task.scheduling.pool.size=4

# ---------------------------------------------------------------------------
# Nexus compatibility
# ---------------------------------------------------------------------------

nexus-plus.compatibility.repository-url-prefix=/repository
nexus-plus.repository.log-non-success-requests=true
nexus-plus.repository.log-non-success-request-excluded-statuses=477,488

# ---------------------------------------------------------------------------
# Cache and catalog refresh
# ---------------------------------------------------------------------------

nexus-plus.cache.backend=memory
nexus-plus.cache.memory.maximum-size=500000
nexus-plus.cache.version.local-ttl-seconds=2

nexus-plus.cache.asset-metadata.enabled=true
nexus-plus.cache.asset-metadata.ttl-seconds=60
nexus-plus.cache.asset-metadata.missing-ttl-seconds=5
nexus-plus.cache.repository-token.local-ttl-seconds=2
nexus-plus.cache.npm-group-packument.enabled=true
nexus-plus.cache.pypi-group-simple-index.enabled=true
nexus-plus.cache.group-member-asset.enabled=true
nexus-plus.cache.group-member-asset.ttl-seconds=60

# Short-TTL auth caches reduce repeated password/API-key lookups on CI traffic.
nexus-plus.cache.basic-auth.enabled=true
nexus-plus.cache.basic-auth.ttl-seconds=120
nexus-plus.cache.basic-auth.missing-ttl-seconds=5
nexus-plus.cache.api-key.enabled=true
nexus-plus.cache.api-key.ttl-seconds=60
nexus-plus.cache.api-key.missing-ttl-seconds=5

# Node-local immutable catalog snapshots. MySQL is the shared source of truth;
# cache_version is used as the cross-replica invalidation watermark.
nexus-plus.catalog-cache.enabled=true
nexus-plus.catalog-cache.refresh-interval-ms=60000
nexus-plus.catalog-cache.initial-delay-ms=60000
# Supported values: mysql, none.
nexus-plus.catalog-cache.broadcast-backend=mysql
nexus-plus.catalog-cache.mysql.poll-delay-ms=500
nexus-plus.catalog-cache.mysql.initial-delay-ms=500
nexus-plus.catalog-cache.mysql.initial-jitter-ms=100

# ---------------------------------------------------------------------------
# Proxy repositories
# ---------------------------------------------------------------------------

nexus-plus.proxy.negative-cache.enabled=true
nexus-plus.proxy.negative-cache.ttl-minutes=5
# Supported values are Java HttpClient versions such as HTTP_1_1 and HTTP_2.
nexus-plus.proxy.remote-http-version=HTTP_1_1
nexus-plus.proxy.search-timeout-seconds=30
nexus-plus.proxy.metadata-timeout-seconds=60
nexus-plus.proxy.content-timeout-seconds=120
nexus-plus.proxy.head-timeout-seconds=5
nexus-plus.proxy.body-read-retry-attempts=1
nexus-plus.maven.proxy-success-throttle-seconds=30

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------

nexus-plus.security.anonymous-read-enabled=false
nexus-plus.security.token-header=X-Nexus-Plus-Token

# Required outside dev/test profiles. Replace with strong, stable secrets before
# production use. Changing them after data is written can make encrypted blob
# store credentials, realm secrets, and API keys unreadable.
nexus-plus.security.encryption.credential-secret=CHANGE_ME_credential_secret_at_least_32_chars
nexus-plus.security.encryption.api-key-payload-secret=CHANGE_ME_api_key_payload_secret_at_least_32_chars

nexus-plus.security.default-authenticated-role-id=nx-anonymous
nexus-plus.security.authorization-cache.enabled=true
nexus-plus.security.authorization-cache.ttl-minutes=10
nexus-plus.security.authorization-cache.version-local-ttl-seconds=2

nexus-plus.security.hsts-enabled=false
# Set this when the service is behind a reverse proxy and OIDC redirect URLs
# must use the public URL, for example https://nexus.example.com.
nexus-plus.security.external-base-url=
nexus-plus.security.csrf.cookie-secure=false

# Outbound policy applies to proxy repository upstream URLs and selected admin
# connectivity checks. Keep private addresses disabled for internet-facing use.
nexus-plus.security.outbound.allow-private-addresses=false
nexus-plus.security.outbound.allowed-hosts=
nexus-plus.security.forwarded-headers.trusted-proxies=

nexus-plus.security.rate-limit.login-per-minute=20
nexus-plus.security.rate-limit.bootstrap-per-minute=5
nexus-plus.security.authentication-ticket-ttl-seconds=300
nexus-plus.security.authentication-ticket-cleanup-interval-ms=60000
nexus-plus.security.authentication-ticket-cleanup-initial-delay-ms=60000
nexus-plus.security.upload.max-request-bytes=1073741824

# ---------------------------------------------------------------------------
# Blob storage
# ---------------------------------------------------------------------------

# S3/OSS client tuning. Actual blob store endpoint, bucket, credentials, and
# engine are configured in /admin/ Blob Store.
nexus-plus.storage.s3.max-connections=512
nexus-plus.storage.s3.connection-timeout-ms=5000
nexus-plus.storage.s3.socket-timeout-ms=120000
nexus-plus.storage.s3.connection-acquisition-timeout-ms=10000
nexus-plus.storage.s3.tcp-keep-alive=true
nexus-plus.storage.s3.multipart-threshold-bytes=67108864
nexus-plus.storage.s3.multipart-part-size-bytes=16777216
nexus-plus.storage.s3.multipart-concurrency=4
nexus-plus.blob.transfer-buffer-size-bytes=1048576

# File blob store is useful for local trial. In production, prefer OSS/S3. File
# blob stores are valid in distributed deployments only when every replica mounts
# the same strong-consistency shared filesystem.
nexus-plus.storage.file.enabled=true
nexus-plus.storage.file.base-dir=${NEXUS_PLUS_HOME}/data/blobs
nexus-plus.storage.file.production-enabled=false
nexus-plus.storage.file.shared-filesystem=false
nexus-plus.storage.file.temp-cleanup-enabled=true
nexus-plus.storage.file.temp-cleanup-interval-ms=300000
nexus-plus.storage.file.temp-cleanup-grace-seconds=86400

# ---------------------------------------------------------------------------
# Background workers
# ---------------------------------------------------------------------------

nexus-plus.repository-index-rebuild.enabled=true
nexus-plus.repository-index-rebuild.poll-interval-ms=1000
nexus-plus.repository-index-rebuild.batch-size=16

nexus-plus.maven.metadata-rebuild.enabled=true
nexus-plus.maven.metadata-rebuild.poll-interval-ms=1000
nexus-plus.maven.metadata-rebuild.batch-size=32
nexus-plus.maven.sync-metadata-rebuild=false
nexus-plus.maven.runtime-cache-ttl-seconds=30

nexus-plus.pypi.index.sync-wait-ms=0

nexus-plus.blob-gc.enabled=true
nexus-plus.blob-gc.poll-interval-ms=30000
nexus-plus.blob-gc.batch-size=64
nexus-plus.blob-gc.reconcile-scan-batch-size=1024
nexus-plus.blob-gc.reconcile-mark-batch-size=256
nexus-plus.blob-gc.deleted-grace-seconds=3600
nexus-plus.blob-gc.claim-retry-seconds=600

# Retry transient MySQL transaction errors in selected operations.
nexus-plus.persistence.transaction-retry.max-attempts=3
nexus-plus.persistence.transaction-retry.initial-backoff-ms=25

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

logging.file.name=${NEXUS_PLUS_HOME}/logs/nexus-plus.log
logging.level.root=INFO
logging.level.com.github.klboke.nexusplus=INFO
