app.id=infra-nexus-plus

server.port=8080
server.shutdown=graceful
server.tomcat.threads.max=${NEXUS_PLUS_TOMCAT_THREADS_MAX:100}
server.tomcat.threads.min-spare=${NEXUS_PLUS_TOMCAT_THREADS_MIN_SPARE:10}
server.tomcat.max-connections=${NEXUS_PLUS_TOMCAT_MAX_CONNECTIONS:2000}
server.tomcat.accept-count=${NEXUS_PLUS_TOMCAT_ACCEPT_COUNT:200}
server.tomcat.connection-timeout=${NEXUS_PLUS_TOMCAT_CONNECTION_TIMEOUT:30s}
server.servlet.context-path=/
server.servlet.session.timeout=${NEXUS_PLUS_SESSION_TIMEOUT:24h}
server.servlet.session.cookie.max-age=${NEXUS_PLUS_SESSION_COOKIE_MAX_AGE:-1}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${NEXUS_PLUS_SESSION_COOKIE_SECURE:false}

spring.application.name=nexus-plus
spring.datasource.url=jdbc:mysql://127.0.0.1:13306/nexus_plus?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=nexus_plus
spring.datasource.password=nexus_plus
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${NEXUS_PLUS_HIKARI_MAXIMUM_POOL_SIZE:50}
spring.datasource.hikari.minimum-idle=${NEXUS_PLUS_HIKARI_MINIMUM_IDLE:10}
spring.datasource.hikari.connection-timeout=${NEXUS_PLUS_HIKARI_CONNECTION_TIMEOUT_MS:5000}
spring.datasource.hikari.idle-timeout=${NEXUS_PLUS_HIKARI_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${NEXUS_PLUS_HIKARI_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.leak-detection-threshold=${NEXUS_PLUS_HIKARI_LEAK_DETECTION_THRESHOLD_MS:30000}
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.session.store-type=${NEXUS_PLUS_SESSION_STORE_TYPE:jdbc}
spring.session.timeout=${NEXUS_PLUS_SESSION_TIMEOUT:24h}
spring.session.jdbc.initialize-schema=never
spring.session.jdbc.table-name=SPRING_SESSION
spring.session.jdbc.flush-mode=on_save
spring.servlet.multipart.max-file-size=${NEXUS_PLUS_MULTIPART_MAX_FILE_SIZE:1024MB}
spring.servlet.multipart.max-request-size=${NEXUS_PLUS_MULTIPART_MAX_REQUEST_SIZE:1024MB}
spring.jackson.default-property-inclusion=non_null
spring.http.converters.preferred-json-mapper=jackson2
spring.jackson.time-zone=Asia/Shanghai
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.task.scheduling.pool.size=${NEXUS_PLUS_TASK_SCHEDULING_POOL_SIZE:4}

management.server.port=${NEXUS_PLUS_MANAGEMENT_PORT:8081}
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.metrics.tags.application=${spring.application.name}

nexus-plus.compatibility.repository-url-prefix=/repository
nexus-plus.repository.log-non-success-requests=${NEXUS_PLUS_REPOSITORY_LOG_NON_SUCCESS_REQUESTS:true}
nexus-plus.repository.log-non-success-request-excluded-statuses=${NEXUS_PLUS_REPOSITORY_LOG_NON_SUCCESS_REQUEST_EXCLUDED_STATUSES:477,488}

nexus-plus.cache.backend=${NEXUS_PLUS_CACHE_BACKEND:memory}
nexus-plus.cache.memory.maximum-size=${NEXUS_PLUS_CACHE_MEMORY_MAXIMUM_SIZE:500000}
nexus-plus.cache.version.local-ttl-seconds=${NEXUS_PLUS_CACHE_VERSION_LOCAL_TTL_SECONDS:2}
nexus-plus.cache.asset-metadata.enabled=${NEXUS_PLUS_CACHE_ASSET_METADATA_ENABLED:true}
nexus-plus.cache.asset-metadata.ttl-seconds=${NEXUS_PLUS_CACHE_ASSET_METADATA_TTL_SECONDS:60}
nexus-plus.cache.asset-metadata.missing-ttl-seconds=${NEXUS_PLUS_CACHE_ASSET_METADATA_MISSING_TTL_SECONDS:5}
nexus-plus.cache.repository-token.local-ttl-seconds=${NEXUS_PLUS_CACHE_REPOSITORY_TOKEN_LOCAL_TTL_SECONDS:2}
nexus-plus.cache.npm-group-packument.enabled=${NEXUS_PLUS_CACHE_NPM_GROUP_PACKUMENT_ENABLED:true}
nexus-plus.cache.pypi-group-simple-index.enabled=${NEXUS_PLUS_CACHE_PYPI_GROUP_SIMPLE_INDEX_ENABLED:true}
nexus-plus.cache.group-member-asset.enabled=${NEXUS_PLUS_CACHE_GROUP_MEMBER_ASSET_ENABLED:true}
nexus-plus.cache.group-member-asset.ttl-seconds=${NEXUS_PLUS_CACHE_GROUP_MEMBER_ASSET_TTL_SECONDS:60}
# Short-TTL cache of Basic-auth results, keyed by HMAC(credentialSecret, user\0pass).
# Avoids recomputing 120k-round PBKDF2 on every request (the auth-path throughput bottleneck).
nexus-plus.cache.basic-auth.enabled=${NEXUS_PLUS_CACHE_BASIC_AUTH_ENABLED:true}
nexus-plus.cache.basic-auth.ttl-seconds=${NEXUS_PLUS_CACHE_BASIC_AUTH_TTL_SECONDS:120}
nexus-plus.cache.basic-auth.missing-ttl-seconds=${NEXUS_PLUS_CACHE_BASIC_AUTH_MISSING_TTL_SECONDS:5}
nexus-plus.proxy.negative-cache.enabled=${NEXUS_PLUS_PROXY_NEGATIVE_CACHE_ENABLED:${NEXUS_PLUS_MAVEN_PROXY_NEGATIVE_CACHE_ENABLED:true}}
nexus-plus.proxy.negative-cache.ttl-minutes=${NEXUS_PLUS_PROXY_NEGATIVE_CACHE_TTL_MINUTES:${NEXUS_PLUS_MAVEN_PROXY_NEGATIVE_CACHE_TTL_MINUTES:5}}
nexus-plus.proxy.remote-http-version=${NEXUS_PLUS_PROXY_REMOTE_HTTP_VERSION:HTTP_1_1}
nexus-plus.proxy.search-timeout-seconds=${NEXUS_PLUS_PROXY_SEARCH_TIMEOUT_SECONDS:${NEXUS_PLUS_NPM_PROXY_SEARCH_TIMEOUT_SECONDS:30}}
nexus-plus.proxy.metadata-timeout-seconds=${NEXUS_PLUS_PROXY_METADATA_TIMEOUT_SECONDS:${NEXUS_PLUS_MAVEN_PROXY_GET_TIMEOUT_SECONDS:60}}
nexus-plus.proxy.content-timeout-seconds=${NEXUS_PLUS_PROXY_CONTENT_TIMEOUT_SECONDS:${NEXUS_PLUS_PROXY_GET_TIMEOUT_SECONDS:${NEXUS_PLUS_MAVEN_PROXY_GET_TIMEOUT_SECONDS:120}}}
nexus-plus.proxy.head-timeout-seconds=${NEXUS_PLUS_PROXY_HEAD_TIMEOUT_SECONDS:${NEXUS_PLUS_MAVEN_PROXY_HEAD_TIMEOUT_SECONDS:5}}
nexus-plus.proxy.body-read-retry-attempts=${NEXUS_PLUS_PROXY_BODY_READ_RETRY_ATTEMPTS:${NEXUS_PLUS_MAVEN_PROXY_BODY_READ_RETRY_ATTEMPTS:1}}

nexus-plus.security.anonymous-read-enabled=false
nexus-plus.security.token-header=X-Nexus-Plus-Token
# Secrets for reversible encryption of credentials/tokens at rest. Required outside the
# dev/test profiles (enforced by EncryptionSecretsVerifier); set strong, stable values.
# credential-secret covers blob-store S3 keys and auth-realm secrets (OIDC clientSecret,
# LDAP bind passwords); api-key-payload-secret covers user-facing API-key tokens.
nexus-plus.security.encryption.credential-secret=${NEXUS_PLUS_CREDENTIAL_SECRET:}
nexus-plus.security.encryption.api-key-payload-secret=${NEXUS_PLUS_API_KEY_PAYLOAD_SECRET:}
nexus-plus.security.default-authenticated-role-id=${NEXUS_PLUS_DEFAULT_AUTHENTICATED_ROLE_ID:nx-anonymous}
nexus-plus.security.authorization-cache.enabled=${NEXUS_PLUS_SECURITY_AUTHORIZATION_CACHE_ENABLED:true}
nexus-plus.security.authorization-cache.ttl-minutes=${NEXUS_PLUS_SECURITY_AUTHORIZATION_CACHE_TTL_MINUTES:10}
nexus-plus.security.authorization-cache.version-local-ttl-seconds=${NEXUS_PLUS_SECURITY_AUTHORIZATION_CACHE_VERSION_LOCAL_TTL_SECONDS:2}
# Node-local immutable catalog snapshots such as security grants/privileges/repository targets and
# blob_store metadata. Mutations refresh the editing node after commit and bump a MySQL version
# watermark so sibling replicas reload on the next poll; the scheduled MySQL sync is the safety net
# for missed changes or external database writes.
nexus-plus.catalog-cache.enabled=${NEXUS_PLUS_CATALOG_CACHE_ENABLED:true}
nexus-plus.catalog-cache.refresh-interval-ms=${NEXUS_PLUS_CATALOG_CACHE_REFRESH_INTERVAL_MS:60000}
nexus-plus.catalog-cache.initial-delay-ms=${NEXUS_PLUS_CATALOG_CACHE_INITIAL_DELAY_MS:60000}
# Supported values: mysql, none.
nexus-plus.catalog-cache.broadcast-backend=${NEXUS_PLUS_CATALOG_CACHE_BROADCAST_BACKEND:mysql}
nexus-plus.catalog-cache.mysql.poll-delay-ms=${NEXUS_PLUS_CATALOG_CACHE_MYSQL_POLL_DELAY_MS:500}
nexus-plus.catalog-cache.mysql.initial-delay-ms=${NEXUS_PLUS_CATALOG_CACHE_MYSQL_INITIAL_DELAY_MS:500}
nexus-plus.catalog-cache.mysql.initial-jitter-ms=${NEXUS_PLUS_CATALOG_CACHE_MYSQL_INITIAL_JITTER_MS:100}
nexus-plus.security.hsts-enabled=${NEXUS_PLUS_HSTS_ENABLED:false}
nexus-plus.security.external-base-url=${NEXUS_PLUS_EXTERNAL_BASE_URL:}
nexus-plus.security.csrf.cookie-secure=${NEXUS_PLUS_CSRF_COOKIE_SECURE:false}
nexus-plus.security.outbound.allow-private-addresses=${NEXUS_PLUS_OUTBOUND_ALLOW_PRIVATE_ADDRESSES:false}
nexus-plus.security.outbound.allowed-hosts=${NEXUS_PLUS_OUTBOUND_ALLOWED_HOSTS:}
nexus-plus.security.forwarded-headers.trusted-proxies=${NEXUS_PLUS_TRUSTED_PROXIES:}
nexus-plus.security.rate-limit.login-per-minute=${NEXUS_PLUS_LOGIN_RATE_LIMIT_PER_MINUTE:20}
nexus-plus.security.rate-limit.bootstrap-per-minute=${NEXUS_PLUS_BOOTSTRAP_RATE_LIMIT_PER_MINUTE:5}
nexus-plus.security.authentication-ticket-ttl-seconds=${NEXUS_PLUS_AUTHENTICATION_TICKET_TTL_SECONDS:300}
nexus-plus.security.authentication-ticket-cleanup-interval-ms=${NEXUS_PLUS_AUTHENTICATION_TICKET_CLEANUP_INTERVAL_MS:60000}
nexus-plus.security.authentication-ticket-cleanup-initial-delay-ms=${NEXUS_PLUS_AUTHENTICATION_TICKET_CLEANUP_INITIAL_DELAY_MS:60000}
nexus-plus.security.upload.max-request-bytes=${NEXUS_PLUS_UPLOAD_MAX_REQUEST_BYTES:1073741824}

# Tier-1 tuning: wide connection pool for metadata-heavy artifact traffic (many concurrent
# small GETs). Portable across all S3-compatible stores (AWS S3, MinIO, OSS, COS, OBS).
nexus-plus.storage.s3.max-connections=${NEXUS_PLUS_S3_MAX_CONNECTIONS:512}
nexus-plus.storage.s3.connection-timeout-ms=${NEXUS_PLUS_S3_CONNECTION_TIMEOUT_MS:5000}
nexus-plus.storage.s3.socket-timeout-ms=${NEXUS_PLUS_S3_SOCKET_TIMEOUT_MS:120000}
nexus-plus.storage.s3.connection-acquisition-timeout-ms=${NEXUS_PLUS_S3_CONNECTION_ACQUISITION_TIMEOUT_MS:10000}
nexus-plus.storage.s3.tcp-keep-alive=${NEXUS_PLUS_S3_TCP_KEEP_ALIVE:true}
nexus-plus.storage.s3.multipart-threshold-bytes=${NEXUS_PLUS_S3_MULTIPART_THRESHOLD_BYTES:67108864}
nexus-plus.storage.s3.multipart-part-size-bytes=${NEXUS_PLUS_S3_MULTIPART_PART_SIZE_BYTES:16777216}
nexus-plus.storage.s3.multipart-concurrency=${NEXUS_PLUS_S3_MULTIPART_CONCURRENCY:4}
nexus-plus.blob.transfer-buffer-size-bytes=${NEXUS_PLUS_BLOB_TRANSFER_BUFFER_SIZE_BYTES:1048576}
nexus-plus.storage.file.enabled=${NEXUS_PLUS_FILE_ENABLED:true}
nexus-plus.storage.file.base-dir=${NEXUS_PLUS_FILE_BASE_DIR:blobs}
# File blob stores are valid in distributed deployments only when every replica mounts the
# same strong-consistency shared filesystem (for example NAS). In prod/production profile,
# both flags below must be true before admins can create or update file blob stores.
nexus-plus.storage.file.production-enabled=${NEXUS_PLUS_FILE_PRODUCTION_ENABLED:false}
nexus-plus.storage.file.shared-filesystem=${NEXUS_PLUS_FILE_SHARED_FILESYSTEM:false}
nexus-plus.storage.file.temp-cleanup-enabled=${NEXUS_PLUS_FILE_TEMP_CLEANUP_ENABLED:true}
nexus-plus.storage.file.temp-cleanup-interval-ms=${NEXUS_PLUS_FILE_TEMP_CLEANUP_INTERVAL_MS:300000}
nexus-plus.storage.file.temp-cleanup-grace-seconds=${NEXUS_PLUS_FILE_TEMP_CLEANUP_GRACE_SECONDS:86400}

nexus-plus.repository-index-rebuild.enabled=${NEXUS_PLUS_REPOSITORY_INDEX_REBUILD_ENABLED:true}
nexus-plus.repository-index-rebuild.poll-interval-ms=${NEXUS_PLUS_REPOSITORY_INDEX_REBUILD_POLL_INTERVAL_MS:1000}
nexus-plus.repository-index-rebuild.batch-size=${NEXUS_PLUS_REPOSITORY_INDEX_REBUILD_BATCH_SIZE:16}
nexus-plus.pypi.index.sync-wait-ms=${NEXUS_PLUS_PYPI_INDEX_SYNC_WAIT_MS:0}
nexus-plus.maven.runtime-cache-ttl-seconds=${NEXUS_PLUS_MAVEN_RUNTIME_CACHE_TTL_SECONDS:30}
nexus-plus.blob-gc.enabled=${NEXUS_PLUS_BLOB_GC_ENABLED:true}
nexus-plus.blob-gc.poll-interval-ms=${NEXUS_PLUS_BLOB_GC_POLL_INTERVAL_MS:30000}
nexus-plus.blob-gc.batch-size=${NEXUS_PLUS_BLOB_GC_BATCH_SIZE:64}
nexus-plus.blob-gc.reconcile-scan-batch-size=${NEXUS_PLUS_BLOB_GC_RECONCILE_SCAN_BATCH_SIZE:1024}
nexus-plus.blob-gc.reconcile-mark-batch-size=${NEXUS_PLUS_BLOB_GC_RECONCILE_MARK_BATCH_SIZE:${NEXUS_PLUS_BLOB_GC_RECONCILE_BATCH_SIZE:256}}
nexus-plus.blob-gc.deleted-grace-seconds=${NEXUS_PLUS_BLOB_GC_DELETED_GRACE_SECONDS:3600}
nexus-plus.blob-gc.claim-retry-seconds=${NEXUS_PLUS_BLOB_GC_CLAIM_RETRY_SECONDS:600}
