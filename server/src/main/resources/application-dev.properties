server.port=18090

management.server.port=18091

spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths[0]=../admin-ui/src/main/resources
spring.devtools.restart.additional-paths[1]=../browse-ui/src/main/resources
spring.devtools.restart.exclude=static/**,public/**,META-INF/resources/admin/**,META-INF/resources/browse/**
spring.devtools.livereload.enabled=true
spring.web.resources.static-locations[0]=file:${user.dir}/admin-ui/src/main/resources/META-INF/resources/
spring.web.resources.static-locations[1]=file:${user.dir}/browse-ui/src/main/resources/META-INF/resources/
spring.web.resources.static-locations[2]=file:${user.dir}/../admin-ui/src/main/resources/META-INF/resources/
spring.web.resources.static-locations[3]=file:${user.dir}/../browse-ui/src/main/resources/META-INF/resources/
spring.web.resources.static-locations[4]=classpath:/META-INF/resources/
spring.web.resources.cache.period=0
spring.thymeleaf.cache=false

logging.level.com.github.klboke.nexusplus=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG

nexus-plus.security.outbound.allow-private-addresses=true
